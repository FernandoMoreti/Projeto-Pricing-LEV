services:
  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api_pricing_prod
    restart: always
    ports:
      - "8001:8001"
    environment:
      - ENV=production

  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: front_pricing_prod
    restart: always
    ports:
      - "60000:3000"
    environment:
      - NEXT_PUBLIC_API_URL_QUEUE=http://192.168.1.90:8001
    depends_on:
      - backend-prod

networks:
  default:
    name: pricing-network
